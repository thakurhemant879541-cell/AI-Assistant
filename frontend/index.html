<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>

    <style>
        body{
            margin:0;
            background:#0f172a;
            color:white;
            font-family:Arial,sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            text-align:center;
            background:#1e293b;

        p{

        button{
            margin-top:20px;
            padding:12px 30px;
            border:none;
            border-radius:30px;
            background:gold;
            color:black;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#ffd700;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 AI Assistant</h1>
    <p>Welcome to Hemant Singh's AI Assistant</p>
